version: 2

models:
  - name: int_order_items_prod
    description: "Enriquece los order items con información de producto, ingresos, costo y beneficio por ítem."
    columns:
      - name: order_id
        description: "Identificador del pedido."
        tests:
          - not_null

      - name: product_id
        description: "Identificador del producto."
        tests:
          - not_null

      - name: quantity
        description: "Cantidad comprada del producto."
        tests:
          - not_null

      - name: price
        description: "Precio unitario del producto."
        tests:
          - not_null

      - name: cost
        description: "Costo unitario del producto."
        tests:
          - not_null

      - name: item_revenue
        description: "Ingresos totales del ítem."
        tests:
          - not_null

      - name: item_cost
        description: "Costo total del ítem."
        tests:
          - not_null

      - name: item_profit
        description: "Beneficio total del ítem."
        tests:
          - not_null

  - name: int_orders_details
    description: "Une pedidos con sus respectivos ítems enriquecidos."
    columns:
      - name: order_id
        description: "Identificador del pedido."
        tests:
          - not_null

      - name: customer_id
        description: "Identificador del cliente."
        tests:
          - not_null

      - name: order_date
        description: "Fecha del pedido."
        tests:
          - not_null

      - name: product_id
        description: "Identificador del producto."
        tests:
          - not_null

      - name: quantity
        description: "Cantidad comprada."
        tests:
          - not_null

      - name: item_revenue
        description: "Ingresos del ítem."
        tests:
          - not_null

  - name: int_cancel_orders
    description: "Tabla intermedia con pedidos cancelados y su respectivo motivo."
    columns:
      - name: order_id
        description: "Identificador del pedido cancelado."
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Identificador del cliente."
        tests:
          - not_null

      - name: cancel_date
        description: "Fecha de la cancelación."
        tests:
          - not_null

      - name: cancel_reason
        description: "Motivo de la cancelación."